<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doer of Stuff - Portfolio of Ian McCarthy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Nunito+Sans:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    :root {
      --color-bg-dark: #081420;
      --color-bg-mid: #225486;
      --color-accent: #C2093F;
      --color-accent-light: #FD346E;
      --color-card-bg: rgba(25, 36, 49, 0.92);
      --color-text: #F2F2F2;
      --color-text-muted: #a0a0a0;
      --nav-height: 100px;
    }
    
    html, body {
      height: 100%;
    }
    
    body {
      font-family: 'Nunito', system-ui, sans-serif;
      background: var(--color-bg-dark);
      color: white;
      overflow-x: hidden;
    }
    
    /* ========== HERO SECTION ========== */
    .hero {
      position: relative;
      min-height: 100vh;
      background: linear-gradient(187deg, var(--color-bg-dark) 0%, var(--color-bg-mid) 100%);
      overflow: hidden;
    }
    
    /* ========== STARS LAYER ========== */
    .stars-container {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }
    
    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      opacity: 0.8;
    }
    
    /* Small stars - slowest */
    .star--sm {
      width: 2px;
      height: 2px;
      animation: rise-slow 60s linear infinite;
    }
    
    /* Medium stars */
    .star--md {
      width: 4px;
      height: 4px;
      opacity: 0.9;
      animation: rise-medium 45s linear infinite;
    }
    
    /* Large stars - fastest (closest) */
    .star--lg {
      width: 7px;
      height: 7px;
      opacity: 1;
      box-shadow: 0 0 6px 1px rgba(255, 255, 255, 0.5);
      animation: rise-fast 30s linear infinite;
    }
    
    /* Extra large accent stars */
    .star--xl {
      width: 12px;
      height: 12px;
      opacity: 0.6;
      box-shadow: 0 0 10px 2px rgba(255, 255, 255, 0.3);
      animation: rise-fastest 25s linear infinite;
    }
    
    @keyframes rise-slow {
      0% { transform: translateY(100vh); }
      100% { transform: translateY(-100vh); }
    }
    
    @keyframes rise-medium {
      0% { transform: translateY(100vh); }
      100% { transform: translateY(-100vh); }
    }
    
    @keyframes rise-fast {
      0% { transform: translateY(100vh); }
      100% { transform: translateY(-100vh); }
    }
    
    @keyframes rise-fastest {
      0% { transform: translateY(100vh); }
      100% { transform: translateY(-100vh); }
    }
    
    /* ========== ASTRONAUT ========== */
    .astronaut {
      position: absolute;
      left: -50px;
      top: 50px;
      width: 580px;
      height: auto;
      z-index: 1;
      pointer-events: none;
    }
    
    .astronaut img {
      width: 100%;
      height: auto;
      filter: drop-shadow(0 20px 40px rgba(0, 0, 0, 0.4));
    }
    
    /* ========== NAVIGATION ========== */
    .nav {
      position: relative;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 3rem;
      background: rgba(25, 36, 49, 0.4);
      backdrop-filter: blur(12px);
      border-bottom: 3px solid var(--color-accent);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }
    
    .logo {
      width: 110px;
      height: auto;
      flex-shrink: 0;
    }
    
    .logo svg {
      width: 100%;
      height: auto;
    }
    
    .nav-links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
    }
    
    .nav-link {
      background: none;
      border: none;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      color: white;
      cursor: pointer;
      padding: 0.5rem 0;
      position: relative;
      transition: color 0.25s ease;
    }
    
    .nav-link:hover {
      color: var(--color-accent-light);
    }
    
    .nav-link.active {
      color: var(--color-accent-light);
      text-shadow: 0 0 20px rgba(253, 52, 110, 0.6);
    }
    
    .nav-link.active::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--color-accent-light);
      border-radius: 1px;
    }
    
    /* ========== MAIN CONTENT ========== */
    .hero-content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      padding: 4rem 3rem 4rem 3rem;
      min-height: calc(100vh - var(--nav-height));
    }
    
    /* ========== HEADLINE ========== */
    .headline {
      font-size: 3.2rem;
      font-weight: 700;
      line-height: 1.3;
      text-align: right;
      max-width: 700px;
      margin-bottom: 3rem;
      text-shadow: 0 8px 24px rgba(255, 255, 255, 0.15);
    }
    
    /* ========== CARDS ========== */
    .cards-container {
      display: flex;
      gap: 1.5rem;
      justify-content: flex-end;
      flex-wrap: wrap;
    }
    
    .definition-card {
      background: var(--color-card-bg);
      border: none;
      border-bottom: 6px solid var(--color-accent);
      border-radius: 0;
      padding: 2rem;
      width: 100%;
      max-width: 400px;
      text-align: left;
      cursor: pointer;
      transition: 
        opacity 0.3s ease,
        transform 0.25s ease,
        box-shadow 0.3s ease,
        border-color 0.3s ease;
    }
    
    .definition-card.active {
      opacity: 1;
      transform: translateY(0);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }
    
    .definition-card.inactive {
      opacity: 0.5;
      border-bottom-color: transparent;
    }
    
    .definition-card.inactive:hover {
      opacity: 0.75;
      transform: translateY(-4px);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.2);
      border-bottom-color: rgba(194, 9, 63, 0.5);
    }
    
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1.5rem;
    }
    
    .word-group {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    
    .word {
      font-size: 2.25rem;
      font-weight: 700;
      color: white;
    }
    
    .phonetic {
      font-size: 1.25rem;
      font-weight: 700;
      color: white;
      opacity: 0.8;
    }
    
    .speaker-icon {
      width: 32px;
      height: 32px;
      color: var(--color-accent-light);
      opacity: 0.7;
      transition: opacity 0.2s ease;
    }
    
    .definition-card:hover .speaker-icon {
      opacity: 1;
    }
    
    .entries {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    
    .entry {
      font-family: 'Nunito Sans', system-ui, sans-serif;
      font-size: 1.05rem;
      line-height: 1.6;
      color: var(--color-text);
      margin: 0;
    }
    
    .entry-num {
      font-weight: 700;
      color: white;
    }
    
    .entry-label {
      font-weight: 700;
    }
    
    .entry-detail {
      font-weight: 300;
      color: var(--color-text-muted);
    }
    
    .entry-text {
      font-weight: 500;
    }
    
    /* ========== RESPONSIVE ========== */
    @media (max-width: 1200px) {
      .astronaut {
        width: 450px;
        left: -80px;
      }
      
      .headline {
        font-size: 2.5rem;
      }
    }
    
    @media (max-width: 900px) {
      .nav {
        padding: 1rem 1.5rem;
      }
      
      .nav-links {
        gap: 1.5rem;
      }
      
      .nav-link {
        font-size: 0.9rem;
      }
      
      .astronaut {
        width: 350px;
        left: -100px;
        top: 120px;
        opacity: 0.6;
      }
      
      .hero-content {
        padding: 2rem 1.5rem;
      }
      
      .headline {
        font-size: 2rem;
        max-width: 500px;
      }
      
      .cards-container {
        flex-direction: column;
        align-items: flex-end;
      }
      
      .definition-card {
        max-width: 100%;
      }
    }
    
    @media (max-width: 600px) {
      .nav-links {
        display: none; /* Would be hamburger menu in production */
      }
      
      .astronaut {
        width: 280px;
        left: -60px;
        top: 80px;
        opacity: 0.4;
      }
      
      .headline {
        font-size: 1.6rem;
        text-align: center;
        max-width: 100%;
      }
      
      .hero-content {
        align-items: center;
      }
      
      .cards-container {
        align-items: stretch;
        width: 100%;
      }
    }
  </style>
</head>

  <script>
    // ========== STAR GENERATION ==========
    function createStars() {
      const container = document.getElementById('stars');
      const starConfigs = [
        { count: 50, className: 'star--sm', delayRange: 60 },
        { count: 30, className: 'star--md', delayRange: 45 },
        { count: 15, className: 'star--lg', delayRange: 30 },
        { count: 5, className: 'star--xl', delayRange: 25 },
      ];
      
      starConfigs.forEach(config => {
        for (let i = 0; i < config.count; i++) {
          const star = document.createElement('div');
          star.className = `star ${config.className}`;
          
          // Random horizontal position across full width
          star.style.left = `${Math.random() * 100}%`;
          
          // Distribute stars throughout the viewport height
          // Using negative delay makes them start at different points in their animation
          star.style.top = `${Math.random() * 100}%`;
          
          // Random animation delay creates staggered, continuous movement
          star.style.animationDelay = `-${Math.random() * config.delayRange}s`;
          
          container.appendChild(star);
        }
      });
    }
    
    createStars();
    
    // ========== CARD INTERACTION ==========
    const navItems = document.querySelectorAll('.nav-link[data-target]');
    const cards = document.querySelectorAll('.definition-card');
    
    function setActive(targetCard) {
      // Update nav
      navItems.forEach(item => {
        if (item.dataset.target === targetCard) {
          item.classList.add('active');
        } else {
          item.classList.remove('active');
        }
      });
      
      // Update cards
      cards.forEach(card => {
        if (card.dataset.card === targetCard) {
          card.classList.add('active');
          card.classList.remove('inactive');
        } else {
          card.classList.remove('active');
          card.classList.add('inactive');
        }
      });
    }
    
    // Nav click handlers
    navItems.forEach(item => {
      item.addEventListener('click', () => {
        setActive(item.dataset.target);
      });
    });
    
    // Card click handlers
    cards.forEach(card => {
      card.addEventListener('click', () => {
        setActive(card.dataset.card);
      });
    });
  </script>
